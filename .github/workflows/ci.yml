# CI für FlexiPlan: statische Analyse + Unit-/Widget-Tests bei jedem
# Push/PR. Validiert damit automatisch auch alle Workout-Vorlagen unter
# workouts/ gegen das Import-Schema (test/workout_templates_test.dart).
# E2E-Tests brauchen einen Android-Emulator und laufen bewusst nur lokal.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
