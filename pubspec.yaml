name: flexiplan
description: Minimalistischer, lokaler Workout-Begleiter und digitales Trainingstagebuch.
publish_to: 'none'
version: 0.2.0+2

# Benötigt Flutter >= 3.29 (CardThemeData/DialogThemeData, PopScope).
environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.3.0
  url_launcher: ^6.3.0
  # 10.x statt 11.x: file_picker 11 setzt unter AGP 9 Built-in Kotlin
  # voraus, das Flutter 3.44 noch nicht unterstützt (Build bricht mit
  # "Symbol nicht gefunden: FilePickerPlugin"). 10.x wendet das klassische
  # Kotlin-Gradle-Plugin an und baut mit dem Flutter-3.44-Template.
  file_picker: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
